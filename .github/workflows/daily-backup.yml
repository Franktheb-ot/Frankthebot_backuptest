name: Daily Workspace Backup

on:
  schedule:
    # Run at 2am UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch:  # Manual trigger option
  push:
    branches:
      - master

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up Git
        run: |
          git config --global user.email "github-actions@workspace"
          git config --global user.name "GitHub Actions"
      
      - name: Commit workspace changes
        run: |
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Workspace backup $(date '+%Y-%m-%d %H:%M')"
      
      - name: Push to remote
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: master